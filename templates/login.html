 <!--formulario solicitar usuario,
contraseña, boton ingresar y aplicarle estilos -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form method="POST" action = "{{ url_for('login_form')}}">
        <div class="form-inputs">
            <input type="text" placeholder="Usuario" name="txtusuario" required>
            <input type="password" placeholder="Contraseña"  name="txtcontrasena" required>
        </div>
        <button type="submit">Ingresar</button>
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </form>
</div>

</body>
</html>
